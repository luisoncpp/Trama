<!DOCTYPE html>
<html>
<head>
<style>
.map-editor__viewport {
  position: relative;
  flex: 1 1 auto;
  min-height: 0;
  overflow: hidden;
  width: 800px;
  height: 600px;
  background: #111;
}

.map-editor__stage {
  position: absolute;
  left: 0;
  top: 0;
  transform-origin: 0 0;
}

.map-editor__image {
  width: 100%;
  height: 100%;
  display: block;
  user-select: none;
}
</style>
</head>
<body>
  <div class="map-editor__viewport">
    <div class="map-editor__stage" id="stage">
      <img class="map-editor__image" id="img" draggable="false" />
    </div>
  </div>
  <script>
    fetch('example-fantasia/res/realm-map.svg')
      .then(res => res.blob())
      .then(blob => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = document.getElementById('img');
          img.onload = () => {
            const stage = document.getElementById('stage');
            stage.style.width = (img.naturalWidth || 1200) + 'px';
            stage.style.height = (img.naturalHeight || 800) + 'px';
            stage.style.transform = `translate(0px, 0px) scale(1)`;
            console.log('Loaded:', img.naturalWidth, img.naturalHeight);
            document.body.appendChild(document.createTextNode(`Loaded: ${img.naturalWidth}x${img.naturalHeight}`));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(blob);
      });
  </script>
</body>
</html>
